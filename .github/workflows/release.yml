name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Build plugin
              run: |
                  npm ci
                  npm run build

            - name: Attest build provenance
              uses: actions/attest@v4
              with:
                  subject-path: |
                      main.js
                      manifest.json
                      styles.css

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  draft: true
                  files: |
                      main.js
                      manifest.json
                      styles.css
